<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cueTimer - Professional</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="ribbon-header">
        <nav class="tab-nav">
            <button class="menu-btn">≡</button>
            <div class="nav-item active" data-tab="commands">Commands</div>
            <div class="nav-item" data-tab="insert">Insert</div>
            <div class="nav-item" data-tab="outputs">Outputs</div>
            <div class="nav-item" data-tab="options">Options</div>
            <div class="nav-item" data-tab="file">File</div>
        </nav>

        <div id="ribbon-commands" class="ribbon-toolbar">
            <!-- Show Controls -->
            <div class="toolbar-group">
                <div class="group-content">
                    <button id="btnStart" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#D32F2F"/></svg>
                        <span>Start</span>
                    </button>
                    <button id="btnStop" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z" fill="#455A64"/></svg>
                        <span>Stop</span>
                    </button>
                    <button id="btnPause" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#0277BD"/></svg>
                        <span>Pause</span>
                    </button>
                    <button id="btnRestart" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="#00796B"/></svg>
                        <span>Restart</span>
                    </button>
                    <button id="btnUndo" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="#9E9E9E"/></svg>
                        <span>Undo</span>
                    </button>
                </div>
                <div class="group-label">Show controls</div>
            </div>

            <!-- Change Duration -->
            <div class="toolbar-group">
                <div class="group-content">
                    <button id="btnAddMin" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="#333"/></svg>
                        <span style="font-size: 8px;">+ 1 minute</span>
                    </button>
                    <button id="btnSubMin" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z" fill="#333"/></svg>
                        <span style="font-size: 8px;">- 1 minute</span>
                    </button>
                    <div class="duration-box">
                        <div class="speed-spinner">
                            <input type="text" id="speedInput" value="100%">
                            <div class="spinner-btns">
                                <button id="speedUp" class="spin-btn">▲</button>
                                <button id="speedDown" class="spin-btn">▼</button>
                            </div>
                        </div>
                        <span style="font-size: 10px;">Speed %</span>
                    </div>
                </div>
                <div class="group-label">Change duration</div>
            </div>

            <!-- View -->
            <div class="toolbar-group">
                <div class="group-content">
                    <button id="btnClock" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" fill="#333"/></svg>
                        <span>Clock</span>
                    </button>
                    <button id="btnPresentation" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z" fill="#333"/></svg>
                        <span>Presentation</span>
                    </button>
                </div>
                <div class="group-label">View</div>
            </div>

            <!-- Edit Controls -->
            <div class="toolbar-group">
                <div class="group-content">
                    <button id="btnNew" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="#00C853"/></svg>
                        <span>New</span>
                    </button>
                    <button id="btnDelete" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="#D32F2F"/></svg>
                        <span>Delete</span>
                    </button>
                    <button id="btnCopy" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="#0277BD"/></svg>
                        <span>Copy</span>
                    </button>
                    <button id="btnPaste" class="btn-ribbon">
                        <svg viewBox="0 0 24 24"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z" fill="#BA68C8"/></svg>
                        <span>Paste</span>
                    </button>
                </div>
                <div class="group-label">Edit controls</div>
            </div>
        </div>

        <!-- Placeholder for other tabs -->
        <div id="ribbon-placeholder" class="ribbon-toolbar hidden">
            <div style="display:flex; align-items:center; justify-content:center; width:100%; color:#999;">
                This tab feature is coming soon...
            </div>
        </div>
    </header>

    <div class="preview-panel">
        <div class="main-timer-box">
            <p id="activeCueName" style="color:#94a3b8; font-size:12px;">READY</p>
            <h1 id="mainDisplay">00:00:00</h1>
        </div>
        <div style="text-align:right;">
            <p style="color:#94a3b8; font-size:11px;">END ACTION</p>
            <h3 id="activeEndAction" style="color:#6366f1;">Overtime</h3>
        </div>
    </div>

    <div class="table-container">
        <table id="cueTable">
            <thead>
                <tr>
                    <th width="40">ID</th>
                    <th>Name</th>
                    <th width="120">Duration</th>
                    <th width="120">Counter</th>
                    <th width="80">Speed</th>
                    <th width="100">Alert 1</th>
                    <th width="100">Alert 2</th>
                    <th width="120">End Action</th>
                </tr>
            </thead>
            <tbody id="cueTableBody"></tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
